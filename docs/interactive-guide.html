<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-session-watchdog 项目导览</title>
<style>
/* ── CSS Variables ── */
:root {
  --accent: #7c6aef;
  --accent2: #a78bfa;
  --bg: #0f0f14;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --text: #e4e4ec;
  --text2: #9ca3af;
  --border: #2a2a3a;
  --card-bg: #181822;
  --code-bg: #12121a;
  --sidebar-bg: #111118;
  --table-row-alt: #1a1a26;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --orange: #fb923c;
  --topbar-h: 52px;
  --sidebar-w: 240px;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

html.light {
  --bg: #f5f5f7;
  --bg2: #eeeef2;
  --bg3: #e5e5eb;
  --text: #1a1a2e;
  --text2: #6b7280;
  --border: #d1d5db;
  --card-bg: #ffffff;
  --code-bg: #f0f0f5;
  --sidebar-bg: #f9f9fb;
  --table-row-alt: #f3f3f8;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── Top Bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}
.topbar-title {
  font-size: 16px; font-weight: 600;
  color: var(--accent2);
}
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.theme-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 6px 14px; cursor: pointer; font-size: 13px;
  transition: background 0.2s, border-color 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }
.hamburger {
  display: none;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 6px 10px; cursor: pointer; font-size: 18px; line-height: 1;
}

/* ── Sidebar ── */
.sidebar {
  position: fixed; top: var(--topbar-h); left: 0;
  width: var(--sidebar-w);
  height: calc(100vh - var(--topbar-h));
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
  z-index: 90;
  transition: transform 0.3s ease;
}
.sidebar.hidden { transform: translateX(-100%); }
.nav-item {
  display: block; width: 100%;
  padding: 10px 20px;
  background: none; border: none;
  color: var(--text2); font-size: 14px;
  text-align: left; cursor: pointer;
  transition: color 0.15s, background 0.15s;
  line-height: 1.5;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active {
  color: var(--accent2); background: var(--bg3);
  border-left: 3px solid var(--accent);
  padding-left: 17px;
}

/* ── Main Content ── */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--topbar-h);
  padding: 32px 40px 60px;
  max-width: 900px;
}
.section { display: none; }
.section.active { display: block; }

/* ── Typography ── */
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
h2 { font-size: 22px; font-weight: 600; margin: 28px 0 12px; color: var(--accent2); }
h3 { font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--text); }
p { margin-bottom: 14px; color: var(--text); }
.subtitle { color: var(--text2); font-size: 15px; margin-bottom: 20px; }

/* ── Cards ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-accent {
  border-left: 4px solid var(--accent);
}
.card-green { border-left-color: var(--green); }
.card-yellow { border-left-color: var(--yellow); }
.card-blue { border-left-color: var(--blue); }
.card-red { border-left-color: var(--red); }
.card-orange { border-left-color: var(--orange); }
.card-label {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  color: var(--accent2); margin-bottom: 8px; letter-spacing: 0.5px;
}

/* ── Analogy Card ── */
.analogy {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 16px 0;
  display: flex; align-items: flex-start; gap: 12px;
}
.analogy-icon {
  font-size: 28px; line-height: 1; flex-shrink: 0; margin-top: 2px;
}
.analogy-text { font-size: 15px; }
.analogy-text strong { color: var(--accent2); }

/* ── Code Blocks ── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 12px 0 16px;
  overflow-x: auto;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  font-size: 13px; line-height: 1.6;
  color: var(--text);
}
.code-cite {
  font-size: 11px; color: var(--text2); margin-top: 6px;
  font-style: italic;
}

/* ── Tables ── */
.table-wrap {
  overflow-x: auto; margin: 12px 0 16px;
}
table {
  width: 100%; border-collapse: collapse;
  font-size: 14px;
}
th, td {
  padding: 10px 14px; text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--bg3); font-weight: 600; color: var(--accent2);
  font-size: 13px;
}
tr:nth-child(even) td { background: var(--table-row-alt); }

/* ── Flow Diagram ── */
.flow {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; margin: 20px 0;
}
.flow-row {
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
  justify-content: center;
}
.flow-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 16px;
  font-size: 13px; white-space: nowrap;
  color: var(--text);
}
.flow-box.highlight {
  border-color: var(--accent);
  background: var(--card-bg);
  color: var(--accent2); font-weight: 600;
}
.flow-arrow {
  color: var(--accent2); font-size: 18px;
  margin: 0 6px; flex-shrink: 0;
}
.flow-arrow-down {
  color: var(--accent2); font-size: 18px;
  margin: 6px 0;
}
.flow-label {
  font-size: 11px; color: var(--text2);
  margin-top: 2px;
}

/* ── Expandable ── */
.expandable {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 10px 0;
  overflow: hidden;
}
.expand-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg3);
  cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--text);
  user-select: none;
}
.expand-header:hover { background: var(--bg2); }
.expand-arrow {
  transition: transform 0.2s; font-size: 12px; color: var(--accent2);
}
.expand-arrow.open { transform: rotate(90deg); }
.expand-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 16px;
  background: var(--card-bg);
}
.expand-body.open {
  max-height: 800px;
  padding: 16px;
}

/* ── Stats Row ── */
.stats-row {
  display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0;
}
.stat-card {
  flex: 1; min-width: 120px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px; text-align: center;
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 28px; font-weight: 700;
  color: var(--accent2);
  line-height: 1.2;
}
.stat-label {
  font-size: 12px; color: var(--text2);
  margin-top: 4px;
}

/* ── Badge ── */
.badge {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
.badge-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
.badge-blue { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-red { background: rgba(248,113,113,0.15); color: var(--red); }
.badge-purple { background: rgba(167,139,250,0.15); color: var(--accent2); }

/* ── Quiz ── */
.quiz-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.quiz-q {
  font-weight: 600; margin-bottom: 12px; font-size: 15px;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 14px;
}
.quiz-opt:hover:not(.disabled) { border-color: var(--accent); }
.quiz-opt.disabled { cursor: default; opacity: 0.85; }
.quiz-opt.correct {
  border-color: var(--green); background: rgba(52,211,153,0.08);
}
.quiz-opt.wrong {
  border-color: var(--red); background: rgba(248,113,113,0.08);
}
.quiz-opt .opt-letter {
  flex-shrink: 0; width: 24px; height: 24px;
  border-radius: 50%; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
}
.quiz-opt.correct .opt-letter { background: var(--green); color: #000; border-color: var(--green); }
.quiz-opt.wrong .opt-letter { background: var(--red); color: #fff; border-color: var(--red); }
.quiz-explain {
  margin-top: 10px; padding: 10px 14px;
  border-radius: 6px; font-size: 13px;
  display: none;
}
.quiz-explain.show { display: block; }
.quiz-explain.correct-msg { background: rgba(52,211,153,0.1); color: var(--green); }
.quiz-explain.wrong-msg { background: rgba(248,113,113,0.1); color: var(--red); }
.quiz-score {
  text-align: center; font-size: 20px; font-weight: 700;
  color: var(--accent2); margin: 20px 0;
  padding: 20px; background: var(--bg3); border-radius: var(--radius);
}

/* ── Tech Tags ── */
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 14px; }
.tag {
  display: inline-block; padding: 3px 12px;
  background: rgba(124,106,239,0.12); color: var(--accent2);
  border-radius: 14px; font-size: 12px; font-weight: 500;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.show { transform: translateX(0); }
  .main { margin-left: 0; padding: 20px 16px 40px; }
  .stats-row { gap: 8px; }
  .stat-card { min-width: 90px; padding: 12px; }
  .stat-num { font-size: 22px; }
  .flow-row { gap: 4px; }
  .flow-box { padding: 6px 10px; font-size: 12px; }
}

/* ── Print ── */
@media print {
  .topbar, .sidebar, .hamburger { display: none !important; }
  .main { margin: 0; padding: 20px; }
  .section { display: block !important; page-break-inside: avoid; margin-bottom: 30px; }
  body { background: #fff; color: #000; }
  .card, .quiz-card { border: 1px solid #ccc; box-shadow: none; }
  .code-block { border: 1px solid #ccc; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>

<!-- Main Content -->
<div class="main" id="main"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════════

var SECTIONS = [
  { id: 'guide',    label: '使用指南',  icon: '\u{1F4D6}' },
  { id: 'overview', label: '项目概览',  icon: '\u{1F441}' },
  { id: 'arch',     label: '架构设计',  icon: '\u{1F3D7}' },
  { id: 'detect',   label: '检测机制',  icon: '\u{1F50D}' },
  { id: 'intervene',label: '干预通知',  icon: '\u{1F6E1}' },
  { id: 'idle',     label: '空闲分类',  icon: '\u{1F916}' },
  { id: 'compare',  label: '方案对比',  icon: '⚖' },
  { id: 'summary',  label: '总结测验',  icon: '\u{1F3AF}' }
];

var QUIZ_DATA = [
  {
    q: '1. 三路检测包含哪三个信号？',
    opts: ['A: CPU / 内存 / 磁盘', 'B: 屏幕哈希 / JSONL 日志 / token 数', 'C: 网络延迟 / 响应时间 / 错误率', 'D: 进程状态 / 线程数 / 文件句柄'],
    answer: 1,
    explain: '三路检测分别是屏幕输出哈希（md5）、JSONL 会话日志最后记录时间、输出 token 数停滞检测。三者全部一致才判定卡住。'
  },
  {
    q: '2. 自动干预使用什么方式恢复会话？',
    opts: ['A: 杀掉进程', 'B: 重启 tmux', 'C: Ctrl-C + 继续消息', 'D: 发送 SIGKILL'],
    answer: 2,
    explain: '干预方式是向 tmux 会话发送 Ctrl-C 中断当前操作，然后输入"继续"消息，这样保留了会话上下文，是非破坏性恢复。'
  },
  {
    q: '3. 空闲分类的第一步是什么？',
    opts: ['A: 直接调用 LLM', 'B: 关键字匹配', 'C: 随机判断', 'D: 人工确认'],
    answer: 1,
    explain: '默认模式下先进行关键字正则匹配（决策类 / 完成类），匹配到"决策"或"完成"即可直接分类；模糊或无法判断时才调用 LLM 语义分析。'
  },
  {
    q: '4. 飞书通知使用什么安全机制？',
    opts: ['A: API Key', 'B: OAuth2', 'C: HMAC 签名', 'D: JWT'],
    answer: 2,
    explain: '飞书 Webhook 使用 HMAC-SHA256 签名验证，每次请求用密钥对消息体签名，接收方校验签名确保消息未被篡改，类似信封蜡封的效果。'
  },
  {
    q: '5. 干预冷却期是多长？',
    opts: ['A: 5 分钟', 'B: 10 分钟', 'C: 15 分钟', 'D: 30 分钟'],
    answer: 1,
    explain: 'INTERVENE_COOLDOWN=600（10 分钟），防止对同一会话频繁执行干预操作。冷却期内即使检测到卡住也不会重复发送 Ctrl-C。'
  }
];

// ══════════════════════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════════════════════

function applyTheme(light) {
  if (light) {
    document.documentElement.classList.add('light');
  } else {
    document.documentElement.classList.remove('light');
  }
  try { localStorage.setItem('watchdog-theme', light ? 'light' : 'dark'); } catch(e) {}
}

function loadTheme() {
  try {
    var t = localStorage.getItem('watchdog-theme');
    if (t === 'light') return true;
    if (t === 'dark') return false;
  } catch(e) {}
  return false;
}

// ══════════════════════════════════════════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════════════════════════════════════════

function ce(tag, className, text) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  if (text !== undefined && text !== null) el.textContent = text;
  return el;
}

function elAppend(parent, tag, className, text) {
  var el = ce(tag, className, text);
  parent.appendChild(el);
  return el;
}

// ══════════════════════════════════════════════════════════════════════════
// BUILD TOPBAR
// ══════════════════════════════════════════════════════════════════════════

function buildTopbar() {
  var bar = document.getElementById('topbar');

  var left = ce('div');
  left.style.display = 'flex';
  left.style.alignItems = 'center';
  left.style.gap = '12px';

  var ham = ce('button', 'hamburger', '☰');
  ham.addEventListener('click', function() {
    var sb = document.getElementById('sidebar');
    sb.classList.toggle('show');
  });
  left.appendChild(ham);

  var title = ce('span', 'topbar-title', 'claude-session-watchdog 导览');
  left.appendChild(title);
  bar.appendChild(left);

  var actions = ce('div', 'topbar-actions');
  var btn = ce('button', 'theme-btn', '');
  btn.id = 'theme-toggle';
  btn.textContent = loadTheme() ? '☀ 浅色' : '☾ 深色';
  btn.addEventListener('click', function() {
    var isLight = document.documentElement.classList.contains('light');
    applyTheme(!isLight);
    btn.textContent = !isLight ? '☀ 浅色' : '☾ 深色';
  });
  actions.appendChild(btn);
  bar.appendChild(actions);
}

// ══════════════════════════════════════════════════════════════════════════
// BUILD SIDEBAR
// ══════════════════════════════════════════════════════════════════════════

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  for (var i = 0; i < SECTIONS.length; i++) {
    (function(idx) {
      var s = SECTIONS[idx];
      var btn = ce('button', 'nav-item', s.icon + '  ' + s.label);
      btn.setAttribute('data-section', s.id);
      if (idx === 0) btn.classList.add('active');
      btn.addEventListener('click', function() {
        navigateTo(s.id);
        sb.classList.remove('show');
      });
      sb.appendChild(btn);
    })(i);
  }
}

// ══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════════════

function navigateTo(id) {
  var sections = document.querySelectorAll('.section');
  for (var i = 0; i < sections.length; i++) {
    sections[i].classList.remove('active');
  }
  var target = document.getElementById('section-' + id);
  if (target) target.classList.add('active');

  var navs = document.querySelectorAll('.nav-item');
  for (var j = 0; j < navs.length; j++) {
    navs[j].classList.remove('active');
    if (navs[j].getAttribute('data-section') === id) {
      navs[j].classList.add('active');
    }
  }
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════════════════════════════════
// EXPANDABLE HELPER
// ══════════════════════════════════════════════════════════════════════════

function makeExpandable(parent, titleText, bodyBuilder) {
  var wrap = ce('div', 'expandable');
  var header = ce('div', 'expand-header');
  var label = ce('span', '', titleText);
  var arrow = ce('span', 'expand-arrow', '▶');
  header.appendChild(label);
  header.appendChild(arrow);
  wrap.appendChild(header);

  var body = ce('div', 'expand-body');
  bodyBuilder(body);
  wrap.appendChild(body);

  header.addEventListener('click', function() {
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  });
  parent.appendChild(wrap);
}

// ══════════════════════════════════════════════════════════════════════════
// QUIZ BUILDER
// ══════════════════════════════════════════════════════════════════════════

var quizScore = 0;
var quizAnswered = 0;

function buildQuiz(parent) {
  quizScore = 0;
  quizAnswered = 0;

  elAppend(parent, 'h2', '', '\u{1F4DD} 测验：检验你的理解');

  for (var i = 0; i < QUIZ_DATA.length; i++) {
    buildQuizQuestion(parent, QUIZ_DATA[i], i);
  }

  var scoreDiv = ce('div', 'quiz-score');
  scoreDiv.id = 'quiz-score';
  scoreDiv.textContent = '完成所有题目后查看得分';
  scoreDiv.style.display = 'none';
  parent.appendChild(scoreDiv);
}

function buildQuizQuestion(parent, data, index) {
  var card = ce('div', 'quiz-card');
  var qEl = ce('div', 'quiz-q', data.q);
  card.appendChild(qEl);

  var optsWrap = ce('div', 'quiz-options');

  for (var i = 0; i < data.opts.length; i++) {
    (function(optIdx) {
      var opt = ce('div', 'quiz-opt');
      var letter = ce('span', 'opt-letter', data.opts[optIdx].charAt(0));
      var text = ce('span', '', data.opts[optIdx].substring(3));
      opt.appendChild(letter);
      opt.appendChild(text);
      opt.setAttribute('data-correct', optIdx === data.answer ? '1' : '0');

      opt.addEventListener('click', function() {
        if (opt.classList.contains('disabled')) return;
        var allOpts = optsWrap.querySelectorAll('.quiz-opt');
        for (var k = 0; k < allOpts.length; k++) {
          allOpts[k].classList.add('disabled');
          if (allOpts[k].getAttribute('data-correct') === '1') {
            allOpts[k].classList.add('correct');
          }
        }
        var isCorrect = opt.getAttribute('data-correct') === '1';
        if (isCorrect) {
          opt.classList.add('correct');
          quizScore++;
        } else {
          opt.classList.add('wrong');
        }
        quizAnswered++;

        var explain = ce('div', 'quiz-explain show');
        explain.classList.add(isCorrect ? 'correct-msg' : 'wrong-msg');
        explain.textContent = (isCorrect ? '✔ 正确！' : '✘ 错误。') + ' ' + data.explain;
        card.appendChild(explain);

        if (quizAnswered === QUIZ_DATA.length) {
          var sd = document.getElementById('quiz-score');
          sd.style.display = 'block';
          sd.textContent = '\u{1F3C6} 测验得分：' + quizScore + ' / ' + QUIZ_DATA.length;
        }
      });

      optsWrap.appendChild(opt);
    })(i);
  }

  card.appendChild(optsWrap);
  parent.appendChild(card);
}

  buildSidebar();

  // Build main content
  var main = document.getElementById('main');

  for (var i = 0; i < SECTIONS.length; i++) {
    var section = ce('div', 'section');
    section.id = 'section-' + SECTIONS[i].id;
    if (i === 0) section.classList.add('active');
    SECTION_BUILDERS[i](section);
    main.appendChild(section);
  }

  // Navigate to first section
  navigateTo('guide');
}

// Start
init();
</script>

</body>
</html>
